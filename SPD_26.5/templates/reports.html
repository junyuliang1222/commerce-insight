{% extends "base.html" %}
{% block content %}
<h2 style="margin-bottom:20px;">业务报表查询</h2>

<div style="display:flex; gap:20px; height:calc(100vh - 120px);">
    <!-- 报表列表 -->
    <div style="width:280px; flex-shrink:0; background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.1); overflow-y:auto;">
        <div style="padding:16px; border-bottom:1px solid #eee; font-weight:600; color:#333;">报表目录</div>
        {% for r in reports %}
        <div class="report-item" data-id="{{ r.id }}" data-type="{{ r.type }}" data-name="{{ r.name }}"
             data-interactive="{{ r.interactive | default('false') }}"
             style="padding:12px 16px; cursor:pointer; border-bottom:1px solid #f5f5f5; transition:background .2s;"
             onmouseover="this.style.background='#e6f7ff'"
             onmouseout="if(!this.classList.contains('active')) this.style.background=''">
            <div style="font-size:14px; color:#333; font-weight:500;">{{ r.id }}. {{ r.name }}</div>
            <div style="font-size:12px; color:#999; margin-top:3px;">{{ r.desc }}</div>
        </div>
        {% endfor %}
    </div>

    <!-- 数据区域 -->
    <div style="flex:1; background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.1); overflow:auto; padding:24px;">
        <div id="report-title" style="font-size:16px; font-weight:600; color:#333; margin-bottom:16px;">
            请从左侧选择一个报表
        </div>
        <div id="report-content">
            <div style="text-align:center; color:#bbb; margin-top:120px; font-size:14px;">
                点击左侧报表名称查看数据
            </div>
        </div>
        <div id="report-filter" style="display:none;"></div>
    </div>
</div>

<script>
(function() {
    var items = document.querySelectorAll('.report-item');
    var titleEl = document.getElementById('report-title');
    var contentEl = document.getElementById('report-content');
    var filterEl = document.getElementById('report-filter');
    var currentId = null;
    var categoryCache = null;

    function highlightItem(id) {
        items.forEach(function(el) {
            el.classList.remove('active');
            el.style.background = '';
            el.style.borderLeft = '';
        });
        var item = document.querySelector('.report-item[data-id="' + id + '"]');
        if (item) {
            item.classList.add('active');
            item.style.background = '#e6f7ff';
            item.style.borderLeft = '3px solid #1890ff';
        }
    }

    function renderTable(columns, rows) {
        var html = '<div style="overflow-x:auto;"><table><thead><tr>';
        for (var i = 0; i < columns.length; i++) {
            html += '<th>' + columns[i] + '</th>';
        }
        html += '</tr></thead><tbody>';
        if (rows.length === 0) {
            var colspan = columns.length;
            html += '<tr><td colspan="' + colspan + '" style="text-align:center;color:#999;">暂无数据</td></tr>';
        }
        for (var r = 0; r < rows.length; r++) {
            html += '<tr>';
            for (var c = 0; c < rows[r].length; c++) {
                var val = rows[r][c];
                if (val === null || val === undefined) {
                    val = '<span style="color:#ccc;">-</span>';
                } else if (typeof val === 'number') {
                    val = val.toLocaleString();
                }
                html += '<td>' + val + '</td>';
            }
            html += '</tr>';
        }
        html += '</tbody></table></div>';
        html += '<div style="margin-top:12px; color:#999; font-size:12px;">共 ' + rows.length + ' 条记录</div>';
        return html;
    }

    function renderCard(columns, rows) {
        var html = '<div class="stat-grid" style="display:flex; gap:16px; margin-top:60px;">';
        var row = rows[0];
        for (var i = 0; i < columns.length; i++) {
            var val = row[i];
            if (typeof val === 'number') {
                val = val.toLocaleString();
            }
            html += '<div class="stat-card">';
            html += '<div class="num" style="font-size:28px;">' + val + '</div>';
            html += '<div class="label">' + columns[i] + '</div>';
            html += '</div>';
        }
        html += '</div>';
        return html;
    }

    function loadReportData(id, name, params) {
        titleEl.textContent = '加载中...';
        contentEl.innerHTML = '<div style="text-align:center; color:#bbb; margin-top:80px;">正在查询数据...</div>';
        filterEl.style.display = 'none';

        var url = '/api/report/' + id;
        if (params) {
            url += '?' + params;
        }

        fetch(url)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                titleEl.textContent = name;
                if (data.type === 'card') {
                    contentEl.innerHTML = renderCard(data.columns, data.rows);
                } else {
                    contentEl.innerHTML = renderTable(data.columns, data.rows);
                }
            })
            .catch(function(e) {
                titleEl.textContent = '查询失败';
                contentEl.innerHTML = '<div style="text-align:center;color:#ff4d4f;margin-top:80px;">请求出错，请重试</div>';
                console.error(e);
            });
    }

    function showCategorySelector(id, name) {
        highlightItem(id);
        titleEl.textContent = name;
        filterEl.style.display = 'block';
        filterEl.innerHTML = '<div style="margin-bottom:16px; padding:16px; background:#fafafa; border-radius:6px; display:flex; gap:16px; align-items:center; flex-wrap:wrap;">'
            + '<span style="font-weight:500; color:#333;">选择两个品类：</span>'
            + '<select id="cat1-select" style="padding:6px 10px; border:1px solid #d9d9d9; border-radius:4px; font-size:13px;"></select>'
            + '<span style="color:#999;">+</span>'
            + '<select id="cat2-select" style="padding:6px 10px; border:1px solid #d9d9d9; border-radius:4px; font-size:13px;"></select>'
            + '<button id="cat-query-btn" class="btn btn-blue" style="padding:7px 20px;">查询</button>'
            + '</div>';
        contentEl.innerHTML = '<div style="text-align:center; color:#bbb; margin-top:60px; font-size:14px;">选择品类后点击「查询」查看同时购买过的用户</div>';

        // populate selects
        function fillSelects(categories) {
            var s1 = document.getElementById('cat1-select');
            var s2 = document.getElementById('cat2-select');
            for (var i = 0; i < categories.length; i++) {
                s1.innerHTML += '<option value="' + categories[i] + '"' + (categories[i] === '手机数码' ? ' selected' : '') + '>' + categories[i] + '</option>';
                s2.innerHTML += '<option value="' + categories[i] + '"' + (categories[i] === '影音娱乐' ? ' selected' : '') + '>' + categories[i] + '</option>';
            }
        }

        if (categoryCache) {
            fillSelects(categoryCache);
        } else {
            fetch('/api/categories')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    categoryCache = data.categories;
                    fillSelects(categoryCache);
                });
        }

        document.getElementById('cat-query-btn').addEventListener('click', function() {
            var c1 = document.getElementById('cat1-select').value;
            var c2 = document.getElementById('cat2-select').value;
            if (c1 === c2) {
                contentEl.innerHTML = '<div style="text-align:center;color:#ff4d4f;margin-top:80px;">请选择两个不同的品类</div>';
                return;
            }
            loadReportData(id, name, 'cat1=' + encodeURIComponent(c1) + '&cat2=' + encodeURIComponent(c2));
        });
    }

    for (var i = 0; i < items.length; i++) {
        items[i].addEventListener('click', function() {
            var id = this.getAttribute('data-id');
            var name = this.getAttribute('data-name');
            var interactive = this.getAttribute('data-interactive') === 'True';

            if (id === currentId && !interactive) return;
            currentId = id;
            highlightItem(id);

            if (interactive) {
                showCategorySelector(id, name);
            } else {
                filterEl.style.display = 'none';
                loadReportData(id, name);
            }
        });
    }
})();
</script>
{% endblock %}
