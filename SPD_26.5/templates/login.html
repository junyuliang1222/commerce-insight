<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 电商后台</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:"Microsoft YaHei",sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-box { background:#fff; padding:40px; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.1); width:380px; }
        .login-box h2 { text-align:center; margin-bottom:30px; color:#333; }
        .login-box input { width:100%; padding:10px 12px; margin-bottom:16px; border:1px solid #d9d9d9; border-radius:4px; font-size:14px; }
        .login-box input:focus { outline:none; border-color:#1890ff; }
        .login-box button { width:100%; padding:10px; background:#1890ff; color:#fff; border:none; border-radius:4px; font-size:15px; cursor:pointer; }
        .login-box button:hover { background:#1677cc; }
        .error { background:#fff2f0; border:1px solid #ffccc7; color:#ff4d4f; padding:10px; border-radius:4px; margin-bottom:16px; font-size:13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>电商后台管理系统</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <input type="text" name="user_name" placeholder="用户名" required>
            <input type="password" name="password" placeholder="密码" required>
            <button type="submit">登 录</button>
        </form>
    </div>
</body>
</html>
