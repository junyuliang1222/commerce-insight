<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>电商后台管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #001529; color: #fff; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 18px; color: #1890ff; }
        .sidebar a { display: block; color: #ccc; text-decoration: none; padding: 12px 24px; font-size: 14px; }
        .sidebar a:hover { background: #1890ff; color: #fff; }
        .sidebar .user-info { padding: 12px 24px; color: #999; font-size: 12px; margin-top: 40px; border-top: 1px solid #333; }
        .main { flex: 1; padding: 24px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .card h3 { margin-bottom: 16px; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: #666; font-weight: 600; }
        tr:hover { background: #f5f5f5; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-blue { background: #1890ff; color: #fff; }
        .btn-blue:hover { background: #1677cc; }
        .btn-green { background: #52c41a; color: #fff; }
        .btn-red { background: #ff4d4f; color: #fff; }
        .stat-grid { display: flex; gap: 16px; }
        .stat-card { flex:1; background:#fff; border-radius:8px; padding:20px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.1); }
        .stat-card .num { font-size: 32px; font-weight: bold; color: #1890ff; }
        .stat-card .label { font-size: 13px; color: #999; margin-top: 6px; }
        input, select, textarea { padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
        input:focus, select:focus { outline: none; border-color: #1890ff; }
        .flash-error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>电商后台</h2>
        <a href="/">📊 首页看板</a>
        {% if 'view_users' in perms %}
        <a href="/users">👤 用户管理</a>
        {% endif %}
        {% if 'view_products' in perms %}
        <a href="/products">📦 商品管理</a>
        {% endif %}
        {% if 'view_orders' in perms %}
        <a href="/orders">📋 订单管理</a>
        {% endif %}
        {% if 'view_analytics' in perms %}
        <a href="/analytics">📈 销售分析</a>
        <a href="/reports">📊 业务报表</a>
        {% endif %}
        <div class="user-info">
            当前用户：{{ user_name }}<br>
            <a href="/logout" style="color:#ff4d4f; padding:0; display:inline;">退出登录</a>
        </div>
    </div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
